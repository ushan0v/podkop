name: Build packages
on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build and publish
        required: true
        type: string

env:
  RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}

permissions:
  contents: write

jobs:
  build:
    name: Build Podkop Plus packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build release artifacts
        shell: bash
        run: |
          bash ./scripts/build-packages.sh "${RELEASE_TAG}" ./dist/release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: release-files-${{ env.RELEASE_TAG }}
          path: ./dist/release/*.*
          retention-days: 1
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-files-${{ env.RELEASE_TAG }}
          path: ./dist/release

      - name: Release
        uses: softprops/action-gh-release@v2.4.0
        with:
          files: ./dist/release/*.*
          draft: false
          prerelease: false
          name: ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
